<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/x-icon" href="images/favicon.ico" />
<link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png" />
<link rel="apple-touch-icon" href="images/apple-touch-icon.png" />
<title>Dooodle</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1a1a2e; --ink-soft: #4a4a6a; --ink-muted: #9090b0;
    --paper: #fafaf7; --surface: #ffffff;
    --accent: #ff6b35; --accent-light: #fff0eb;
    --green: #2d9c6e; --green-light: #e8f7f1;
    --border: #e8e8f0; --radius: 12px; --radius-lg: 20px;
    --font: 'Manrope', sans-serif;
    --safe-top: env(safe-area-inset-top, 0px);
  }
  html { font-size: 17px; }
  body { font-family: var(--font); background: var(--paper); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; }

  header {
    padding: 1rem 1.25rem;
    padding-top: calc(1rem + var(--safe-top));
    display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid var(--border); background: var(--surface);
  }
  .logo { font-family: var(--font); font-weight: 800; font-size: 1.4rem; color: var(--ink); letter-spacing: -0.5px; flex-shrink: 0; }
  .logo span { color: var(--accent); }
  .tagline { font-size: 0.82rem; color: var(--ink-muted); font-weight: 400; margin-left: 4px; padding-left: 14px; border-left: 1px solid var(--border); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lang-toggle { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; flex-shrink: 0; margin-left: auto; }
  .lang-btn { padding: 5px 9px; background: none; border: none; font-family: var(--font); font-size: 0.75rem; font-weight: 600; cursor: pointer; color: var(--ink-muted); transition: background 0.12s, color 0.12s; letter-spacing: 0.03em; }
  .lang-btn:first-child { border-right: 1px solid var(--border); }
  .lang-btn.active { background: var(--ink); color: white; }
  @media (max-width: 480px) {
    .tagline { display: none; }
    header { padding: 0.9rem 1rem; padding-top: calc(0.9rem + var(--safe-top)); }
    .logo { font-size: 1.25rem; }
  }

  .hero { padding: 3rem 2rem 1.5rem; text-align: center; max-width: 580px; margin: 0 auto; }
  .hero h1 { font-family: var(--font); font-size: 2.6rem; font-weight: 700; line-height: 1.15; letter-spacing: -0.5px; margin-bottom: 0.75rem; }
  .hero h1 em { font-style: normal; color: var(--accent); }
  .hero p { font-size: 1rem; color: var(--ink-soft); font-weight: 300; line-height: 1.65; }

  .form-wrap { max-width: 580px; margin: 1.5rem auto 4rem; padding: 0 1.5rem; width: 100%; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem 1.75rem; margin-bottom: 1rem; }
  .field-label { font-size: 0.74rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-muted); display: block; margin-bottom: 9px; }

  input[type="text"] {
    width: 100%; padding: 0.8rem 1rem; border: 1.5px solid var(--border); border-radius: var(--radius);
    font-family: var(--font); font-size: 1.05rem; color: var(--ink);
    background: var(--paper); outline: none; transition: border-color 0.15s;
  }
  input[type="text"]:focus { border-color: var(--accent); background: var(--surface); }

  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .cal-month-label { font-family: var(--font); font-size: 1rem; font-weight: 700; color: var(--ink); }
  .cal-nav-btn {
    background: none; border: 1px solid var(--border); border-radius: 8px;
    width: 32px; height: 32px; cursor: pointer; font-size: 1.1rem; color: var(--ink-soft);
    display: flex; align-items: center; justify-content: center; transition: background 0.12s, color 0.12s;
  }
  .cal-nav-btn:hover { background: var(--paper); color: var(--ink); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-day-header { text-align: center; font-size: 0.7rem; font-weight: 600; color: var(--ink-muted); padding: 4px 0 8px; text-transform: uppercase; letter-spacing: 0.05em; }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    border-radius: 8px; font-size: 0.9rem; cursor: pointer; border: 1.5px solid transparent;
    transition: background 0.1s, border-color 0.1s, color 0.1s; color: var(--ink);
  }
  @media (hover: hover) {
    .cal-day:hover:not(.empty):not(.past):not(.selected) { background: var(--accent-light); border-color: #ffd4c2; color: var(--accent); }
    .cal-day.selected:hover { background: #e85a24; border-color: #e85a24; color: white; }
  }
  .cal-day.past { color: var(--ink-muted); cursor: default; opacity: 0.4; }
  .cal-day.today { border-color: var(--border); font-weight: 700; }
  .cal-day.selected { background: var(--accent); color: white; border-color: var(--accent); font-weight: 600; }
  .cal-day.empty { cursor: default; }

  .selected-dates-wrap { margin-top: 1.25rem; border-top: 1px solid var(--border); padding-top: 1rem; }
  .selected-dates-label { font-size: 0.74rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-muted); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .selected-count { background: var(--accent); color: white; border-radius: 999px; font-size: 0.7rem; font-weight: 600; padding: 1px 7px; }
  .chips-list { display: flex; flex-wrap: wrap; gap: 6px; min-height: 28px; }
  .date-chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; background: var(--accent-light); border: 1px solid #ffd4c2; border-radius: 999px; font-size: 0.83rem; color: var(--accent); font-weight: 500; animation: popIn 0.12s ease; }
  @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .chip-remove { background: none; border: none; cursor: pointer; color: var(--accent); font-size: 1rem; line-height: 1; padding: 0; opacity: 0.5; }
  .chip-remove:hover { opacity: 1; }
  .no-dates-msg { font-size: 0.85rem; color: var(--ink-muted); font-style: italic; }

  .btn-create { width: 100%; padding: 1rem; background: var(--accent); color: white; border: none; border-radius: var(--radius-lg); font-family: var(--font); font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: background 0.15s, transform 0.1s, box-shadow 0.15s; box-shadow: 0 4px 20px rgba(255,107,53,0.25); }
  .btn-create:hover { background: #e85a24; box-shadow: 0 6px 24px rgba(255,107,53,0.35); }
  .btn-create:active { transform: scale(0.98); }
  .btn-create:disabled { background: var(--ink-muted); box-shadow: none; cursor: not-allowed; }
  .error-msg { font-size: 0.85rem; color: #c0392b; margin-top: 8px; min-height: 20px; }

  .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(250,250,247,0.88); z-index: 100; align-items: center; justify-content: center; flex-direction: column; gap: 14px; }
  .loading-overlay.visible { display: flex; }
  .spinner { width: 34px; height: 34px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-family: var(--font); font-size: 0.9rem; color: var(--ink-soft); }
  footer { margin-top: auto; padding: 1.25rem; text-align: center; font-size: 0.73rem; color: var(--ink-muted); border-top: 1px solid var(--border); }
</style>
</head>
<body>

<header>
  <div class="logo">Do<span>oo</span>dle</div>
  <span class="tagline" id="tagline"></span>
  <div class="lang-toggle">
    <button class="lang-btn" id="lang-fr">FR</button>
    <button class="lang-btn" id="lang-en">EN</button>
  </div>
</header>

<div class="hero">
  <h1 id="hero-title"></h1>
  <p id="hero-sub"></p>
</div>

<div class="form-wrap">
  <div class="card">
    <label class="field-label" id="label-event-title" for="event-title"></label>
    <input type="text" id="event-title" maxlength="80" />
  </div>

  <div class="card">
    <label class="field-label" id="label-dates"></label>
    <div class="cal-nav">
      <button class="cal-nav-btn" id="prev-month">&#8249;</button>
      <span class="cal-month-label" id="month-label"></span>
      <button class="cal-nav-btn" id="next-month">&#8250;</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="selected-dates-wrap">
      <div class="selected-dates-label">
        <span id="label-selected"></span>
        <span class="selected-count" id="selected-count">0</span>
      </div>
      <div class="chips-list" id="chips-list"></div>
    </div>
  </div>

  <button class="btn-create" id="btn-create"></button>
  <div class="error-msg" id="error-msg"></div>
</div>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text"></div>
</div>

<footer id="footer"></footer>

<script src="i18n.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
  const selectedDates = new Set();
  const today = new Date(); today.setHours(0,0,0,0);
  let viewYear = today.getFullYear(), viewMonth = today.getMonth();

  function toKey(y,m,d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
  function formatKey(key) {
    return cap(new Date(key+'T12:00:00').toLocaleDateString(t().locale,{weekday:'short',day:'numeric',month:'short'}));
  }
  function cap(s) { return s.charAt(0).toUpperCase()+s.slice(1); }
  function toSlug(title) {
    return title.normalize('NFD').replace(/[\u0300-\u036f]/g,'')
      .toLowerCase().trim().replace(/[^a-z0-9\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-').slice(0,50);
  }

  function applyTranslations() {
    const lang = getLang();
    document.documentElement.lang = lang;
    document.getElementById('lang-fr').classList.toggle('active', lang==='fr');
    document.getElementById('lang-en').classList.toggle('active', lang==='en');
    document.getElementById('tagline').textContent = t().tagline;
    document.getElementById('hero-title').innerHTML = t().heroTitle;
    document.getElementById('hero-sub').textContent = t().heroSub;
    document.getElementById('label-event-title').textContent = t().labelEventTitle;
    document.getElementById('event-title').placeholder = t().placeholderEventTitle;
    document.getElementById('label-dates').textContent = t().labelDates;
    document.getElementById('label-selected').textContent = t().labelSelected;
    document.getElementById('btn-create').textContent = t().btnCreate;
    document.getElementById('loading-text').textContent = t().loadingCreate;
    document.getElementById('footer').textContent = t().footer;
    renderCalendar();
    renderChips();
  }

  document.getElementById('lang-fr').addEventListener('click', () => { setLang('fr'); applyTranslations(); });
  document.getElementById('lang-en').addEventListener('click', () => { setLang('en'); applyTranslations(); });

  function renderCalendar() {
    const label = document.getElementById('month-label');
    const grid  = document.getElementById('cal-grid');
    label.textContent = cap(new Date(viewYear,viewMonth,1).toLocaleDateString(t().locale,{month:'long',year:'numeric'}));
    grid.innerHTML = '';
    t().dayHeaders.forEach(h => { const el=document.createElement('div'); el.className='cal-day-header'; el.textContent=h; grid.appendChild(el); });
    let startDow = new Date(viewYear,viewMonth,1).getDay();
    startDow = (startDow+6)%7;
    for(let i=0;i<startDow;i++){const el=document.createElement('div');el.className='cal-day empty';grid.appendChild(el);}
    const dim = new Date(viewYear,viewMonth+1,0).getDate();
    for(let day=1;day<=dim;day++){
      const key=toKey(viewYear,viewMonth,day);
      const date=new Date(key+'T12:00:00');
      const isPast=date<today, isToday=date.getTime()===today.getTime(), isSel=selectedDates.has(key);
      const el=document.createElement('div');
      el.className='cal-day'+(isPast?' past':'')+(isToday?' today':'')+(isSel?' selected':'');
      el.textContent=day;
      if(!isPast) el.addEventListener('click',()=>toggleDate(key));
      grid.appendChild(el);
    }
  }

  function toggleDate(key) {
    if(selectedDates.has(key)) selectedDates.delete(key); else selectedDates.add(key);
    renderCalendar(); renderChips();
  }

  function renderChips() {
    const list=document.getElementById('chips-list');
    document.getElementById('selected-count').textContent=selectedDates.size;
    if(selectedDates.size===0){list.innerHTML=`<span class="no-dates-msg">${t().noDatesTip}</span>`;return;}
    list.innerHTML=Array.from(selectedDates).sort().map(k=>`<div class="date-chip">${formatKey(k)}<button class="chip-remove" data-key="${k}">×</button></div>`).join('');
    list.querySelectorAll('.chip-remove').forEach(btn=>btn.addEventListener('click',()=>toggleDate(btn.dataset.key)));
  }

  document.getElementById('prev-month').addEventListener('click',()=>{viewMonth--;if(viewMonth<0){viewMonth=11;viewYear--;}renderCalendar();});
  document.getElementById('next-month').addEventListener('click',()=>{viewMonth++;if(viewMonth>11){viewMonth=0;viewYear++;}renderCalendar();});

  document.getElementById('btn-create').addEventListener('click', async()=>{
    const title=document.getElementById('event-title').value.trim();
    const errEl=document.getElementById('error-msg');
    errEl.textContent='';
    if(!title){errEl.textContent=t().errNoTitle;return;}
    if(selectedDates.size<2){errEl.textContent=t().errNoDates;return;}
    document.getElementById('loading').classList.add('visible');
    document.getElementById('btn-create').disabled=true;
    try {
      const baseSlug=toSlug(title);
      const existing=await db.collection('polls').where('slug','==',baseSlug).limit(1).get();
      const slug=existing.empty?baseSlug:baseSlug+'-'+Math.random().toString(36).slice(2,6);
      await db.collection('polls').doc(slug).set({slug,title,dates:Array.from(selectedDates).sort(),votes:{},createdAt:new Date().toISOString()});
      window.location.href='poll.html?id='+slug;
    } catch(e) {
      console.error(e);
      document.getElementById('loading').classList.remove('visible');
      document.getElementById('btn-create').disabled=false;
      document.getElementById('error-msg').textContent=t().errCreate;
    }
  });

  applyTranslations();
</script>
</body>
</html>
