<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Dooodle — Redirection…</title>
<script>
  (function() {
    var path = window.location.pathname;
    var parts = path.replace(/\/$/, '').split('/');
    var slug = parts[parts.length - 1];

    // Never redirect known static files or empty slugs
    var staticExtensions = ['.html', '.js', '.css', '.png', '.ico', '.json', '.txt'];
    var hasExtension = staticExtensions.some(function(ext) { return slug.endsWith(ext); });
    var knownPages = ['dooodle', 'index', 'poll', '404', ''];

    if (slug && !hasExtension && knownPages.indexOf(slug) === -1) {
      window.location.replace('/dooodle/poll.html?id=' + encodeURIComponent(slug));
    } else {
      window.location.replace('/dooodle/index.html');
    }
  })();
</script>
</head>
<body>
  <p>Redirection…</p>
</body>
</html>
