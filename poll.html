<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dooodle — Voter</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1a1a2e; --ink-soft: #4a4a6a; --ink-muted: #9090b0;
    --paper: #fafaf7; --surface: #ffffff;
    --accent: #ff6b35; --accent-light: #fff0eb;
    --green: #2d9c6e; --green-light: #e8f7f1;
    --border: #e8e8f0; --radius: 12px; --radius-lg: 20px;
    --font-title: 'Manrope', sans-serif;
    --font-body: 'Manrope', sans-serif;
  }
  html { font-size: 17px; }
  body { font-family: var(--font-body); background: var(--paper); color: var(--ink); min-height: 100vh; }

  header {
    padding: 1rem 1.25rem;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border); background: var(--surface);
    gap: 8px;
  }
  .header-left { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .logo { font-family: var(--font-title); font-weight: 800; font-size: 1.4rem; color: var(--ink); text-decoration: none; letter-spacing: -0.5px; flex-shrink: 0; }
  .logo span { color: var(--accent); }
  .btn-new-poll {
    padding: 0.5rem 0.9rem;
    background: var(--accent); color: white; border: none; border-radius: var(--radius);
    font-family: var(--font-title); font-size: 0.82rem; font-weight: 600; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
    transition: background 0.15s; white-space: nowrap; flex-shrink: 0;
  }
  .btn-new-poll:hover { background: #e85a24; }
  .lang-toggle { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; flex-shrink: 0; }
  .lang-btn { padding: 5px 9px; background: none; border: none; font-family: var(--font-body); font-size: 0.75rem; font-weight: 600; cursor: pointer; color: var(--ink-muted); transition: background 0.12s, color 0.12s; letter-spacing: 0.03em; }
  .lang-btn:first-child { border-right: 1px solid var(--border); }
  .lang-btn.active { background: var(--ink); color: white; }
  @media (max-width: 480px) {
    .btn-new-poll span { display: none; }
    .btn-new-poll::before { content: '+'; }
  }

  .page-wrap { max-width: 640px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* EVENT HEADER */
  .event-header { margin-bottom: 2rem; }
  .event-title {
    font-family: var(--font-title);
    font-size: 2rem; font-weight: 700; letter-spacing: -0.3px;
    color: var(--ink); margin-bottom: 0.5rem; line-height: 1.2;
  }
  .event-meta { font-size: 0.85rem; color: var(--ink-muted); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .meta-pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; background: var(--paper); border: 1px solid var(--border);
    border-radius: 999px; font-size: 0.8rem; color: var(--ink-soft);
  }

  /* SHARE SECTION */
  .share-section {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 1rem 1.25rem; margin-bottom: 1.75rem;
  }
  .share-intro { font-size: 0.85rem; color: var(--ink-soft); margin-bottom: 10px; line-height: 1.5; }
  .share-intro strong { color: var(--ink); font-weight: 600; }
  .share-row { display: flex; align-items: center; gap: 8px; }
  .share-url { flex: 1; font-family: monospace; font-size: 0.78rem; color: var(--ink-soft); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; background: var(--paper); border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; }
  .btn-copy {
    padding: 7px 14px; background: var(--ink); color: white; border: none; border-radius: 8px;
    font-family: var(--font-body); font-size: 0.82rem; font-weight: 600; cursor: pointer;
    white-space: nowrap; transition: background 0.15s; flex-shrink: 0;
  }
  .btn-copy:hover { background: #333; }
  .btn-copy.copied { background: var(--green); }
  .btn-whatsapp {
    padding: 7px 14px; background: #25D366; color: white; border: none; border-radius: 8px;
    font-family: var(--font-body); font-size: 0.82rem; font-weight: 600; cursor: pointer;
    white-space: nowrap; transition: background 0.15s; flex-shrink: 0;
    text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-whatsapp:hover { background: #1dba57; }
  .btn-whatsapp svg { width: 15px; height: 15px; flex-shrink: 0; }

  /* TABS */
  .tabs { display: flex; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 1.5rem; background: var(--surface); }
  .tab { flex: 1; padding: 0.7rem; background: none; border: none; font-family: var(--font-body); font-size: 0.92rem; font-weight: 400; color: var(--ink-muted); cursor: pointer; transition: background 0.12s, color 0.12s; }
  .tab:not(:last-child) { border-right: 1px solid var(--border); }
  .tab.active { background: var(--ink); color: white; font-weight: 500; }
  .tab:hover:not(.active) { background: var(--paper); color: var(--ink-soft); }

  /* VOTE TAB */
  .vote-name-row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
  .field-label { font-size: 0.74rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-muted); display: block; margin-bottom: 7px; }
  input[type="text"] {
    width: 100%; padding: 0.75rem 1rem; border: 1.5px solid var(--border); border-radius: var(--radius);
    font-family: var(--font-body); font-size: 1.05rem; color: var(--ink);
    background: var(--paper); outline: none; transition: border-color 0.15s;
  }
  input[type="text"]:focus { border-color: var(--accent); background: var(--surface); }

  /* VOTE CALENDAR */
  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .cal-nav-btn {
    background: none; border: 1px solid var(--border); border-radius: 8px;
    width: 32px; height: 32px; cursor: pointer; font-size: 1.2rem; color: var(--ink-soft);
    display: flex; align-items: center; justify-content: center; transition: background 0.12s, color 0.12s;
  }
  .cal-nav-btn:hover:not(:disabled) { background: var(--paper); color: var(--ink); }
  .vote-calendars { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.25rem; }
  .vote-cal-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem 1.5rem; }
  .vote-cal-month { font-family: var(--font-title); font-size: 1rem; font-weight: 700; color: var(--ink); margin-bottom: 10px; text-transform: capitalize; }
  .vote-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .vcal-header { text-align: center; font-size: 0.7rem; font-weight: 600; color: var(--ink-muted); padding: 2px 0 6px; text-transform: uppercase; letter-spacing: 0.04em; }
  .vcal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    border-radius: 7px; font-size: 0.88rem; border: 1.5px solid transparent;
    transition: background 0.1s, border-color 0.1s, color 0.1s; position: relative;
  }
  .vcal-day.inactive { color: var(--ink-muted); opacity: 0.3; }
  .vcal-day.proposed { color: var(--ink); cursor: pointer; font-weight: 500; border-color: var(--border); background: var(--paper); }
  .vcal-day.proposed:hover { border-color: var(--green); background: var(--green-light); color: var(--green); }
  .vcal-day.proposed.selected { background: var(--green); border-color: var(--green); color: white; font-weight: 600; }
  .vcal-day.proposed.selected::after { content:''; position:absolute; bottom:3px; left:50%; transform:translateX(-50%); width:3px; height:3px; border-radius:50%; background:rgba(255,255,255,0.7); }

  .btn-submit {
    width: 100%; padding: 0.95rem; background: var(--accent); color: white; border: none; border-radius: var(--radius-lg);
    font-family: var(--font-title); font-size: 1rem; font-weight: 700; cursor: pointer;
    transition: background 0.15s, transform 0.1s; box-shadow: 0 4px 18px rgba(255,107,53,0.22);
  }
  .btn-submit:hover { background: #e85a24; }
  .btn-submit:active { transform: scale(0.98); }
  .btn-submit:disabled { background: var(--ink-muted); box-shadow: none; cursor: not-allowed; }
  .vote-msg { text-align: center; font-size: 0.88rem; color: var(--green); font-weight: 500; margin-top: 10px; min-height: 20px; }
  .vote-msg.error { color: #c0392b; }

  /* RESULTS TAB */
  .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .result-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 8px; }
  .result-item.top { border-color: var(--green); border-width: 1.5px; }
  .result-top-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .rank-num { font-family: var(--font-title); font-size: 0.82rem; font-weight: 700; color: var(--ink-muted); width: 20px; flex-shrink: 0; }
  .rank-num.gold { color: var(--accent); }
  .result-date-label { font-size: 0.98rem; font-weight: 500; color: var(--ink); flex: 1; }
  .result-score { font-size: 0.85rem; color: var(--ink-soft); font-weight: 500; }
  .result-bar-wrap { height: 5px; background: var(--border); border-radius: 999px; overflow: hidden; margin-bottom: 8px; }
  .result-bar { height: 100%; border-radius: 999px; background: var(--ink-muted); transition: width 0.5s ease; }
  .result-item.top .result-bar { background: var(--green); }
  .result-voters { display: flex; flex-wrap: wrap; gap: 5px; }
  .voter-pill { display: inline-block; padding: 2px 9px; background: var(--green-light); color: var(--green); border-radius: 999px; font-size: 0.78rem; font-weight: 500; }
  .no-votes-msg { text-align: center; padding: 3rem 0; color: var(--ink-muted); font-size: 0.92rem; }

  /* PARTICIPANTS TAB */
  .participant-item { display: flex; align-items: center; gap: 12px; padding: 0.9rem 1.25rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; }
  .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent-light); color: var(--accent); font-family: var(--font-title); font-size: 0.85rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .participant-name { font-size: 0.98rem; font-weight: 500; color: var(--ink); }
  .participant-dates-summary { margin-left: auto; font-size: 0.82rem; color: var(--ink-muted); }

  /* STATES */
  .state-screen { text-align: center; padding: 5rem 2rem; }
  .spinner { width: 34px; height: 34px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .state-screen p { color: var(--ink-muted); font-size: 0.92rem; }
  .state-screen h2 { font-family: var(--font-title); font-size: 1.4rem; margin-bottom: 8px; }

  /* VOTE EDIT HINT */
  .edit-hint {
    font-size: 0.8rem; color: var(--ink-muted); text-align: center;
    margin-top: 8px; padding: 6px 12px;
    background: var(--paper); border-radius: var(--radius);
    border: 1px solid var(--border);
  }
</style>
</head>

<script>

    apiKey: "AIzaSyBFubNBtvGXJDG7TubBJ-REiaqaTSUFMX0",

    messagingSenderId: "325060168942",

  });
  const db = firebase.firestore();

  const urlParams = new URLSearchParams(window.location.search);
  const pollId = urlParams.get('id');

  let poll = null;
  let selectedDates = new Set();
  let currentTab = 'vote';

  function formatDate(str) { return new Date(str+'T12:00:00').toLocaleDateString(t().locale,{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }
  function formatDateShort(str) { return new Date(str+'T12:00:00').toLocaleDateString('fr-BE',{weekday:'short',day:'numeric',month:'short'}); }
  function getInitials(name) { return name.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2); }
  function cap(str) { return str.charAt(0).toUpperCase()+str.slice(1); }
  function escHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  async function loadPoll() {
    if(!pollId){showError();return;}
    try {
      const snap = await db.collection('polls').doc(pollId).get();
      if(!snap.exists){showError();return;}
      poll = snap.data();
      renderPoll();
    } catch(e) { console.error(e); showError(); }
  }

  function showError() {
    document.getElementById('loading-screen').style.display='none';
    document.getElementById('error-screen').style.display='block';
  }

  function renderPoll() {
    document.title = `Dooodle — ${poll.title}`;
    document.getElementById('loading-screen').style.display='none';
    const content = document.getElementById('poll-content');
    content.style.display='block';

    const voters = Object.keys(poll.votes||{});
    const dateCount = poll.dates.length;
    const shareUrl = window.location.href;

    content.innerHTML = `

        <div class="event-title">${escHtml(poll.title)}</div>
        <div class="event-meta">
          <span class="meta-pill">📅 ${t().dateProposed(dateCount)}</span>

            ${t().btnWhatsapp}
          </a>
        </div>
      </div>
      <div class="tabs">
        <button class="tab active" id="tab-btn-vote">${t().tabVote}</button>
        <button class="tab" id="tab-btn-participants">${t().tabParticipants} <span id="participants-count">(${voters.length})</span></button>
        <button class="tab" id="tab-btn-results">${t().tabResults}</button>
      </div>
      <div id="tab-vote">
        <div class="vote-name-row">
          <label class="field-label" for="voter-name">${t().labelName}</label>
          <input type="text" id="voter-name" placeholder="${t().placeholderName}" maxlength="40" />
        </div>
        <p style="font-size:0.85rem;color:var(--ink-muted);margin-bottom:0.75rem;">${t().calTip}</p>
        <div class="vote-cal-card" id="vote-cal-card">
          <div class="cal-nav">
            <button class="cal-nav-btn" id="vcal-prev">&#8249;</button>
            <span class="vote-cal-month" id="vcal-month-label"></span>
            <button class="cal-nav-btn" id="vcal-next">&#8250;</button>
          </div>
          <div class="vote-cal-grid" id="vcal-grid"></div>
        </div>
        <button class="btn-submit" id="btn-submit">${t().btnSubmit}</button>
        <div class="edit-hint">${t().editHint}</div>
        <div class="vote-msg" id="vote-msg"></div>
      </div>
      <div id="tab-participants" style="display:none;"></div>
      <div id="tab-results" style="display:none;"></div>
    `;

    // Wire up events
    document.getElementById('copy-btn').addEventListener('click', copyLink);
    const waBtn = document.getElementById('whatsapp-btn');
    if (waBtn) {
      const waText = encodeURIComponent(t().waMessage(poll.title, shareUrl));
      waBtn.href = 'https://wa.me/?text=' + waText;
    }
    document.getElementById('btn-submit').addEventListener('click', submitVote);
    document.getElementById('tab-btn-vote').addEventListener('click', ()=>switchTab('vote'));
    document.getElementById('tab-btn-participants').addEventListener('click', ()=>switchTab('participants'));
    document.getElementById('tab-btn-results').addEventListener('click', ()=>switchTab('results'));

    renderVoteCalendars();
  }

  /* --- Vote calendar with navigation --- */
  const VCAL_HEADERS = ['Lu','Ma','Me','Je','Ve','Sa','Di'];
  let vcalYear, vcalMonth;

  function initVoteCalendar() {
    // Start on the first month that has proposed dates
    const firstDate = poll.dates[0];
    vcalYear  = parseInt(firstDate.slice(0,4));
    vcalMonth = parseInt(firstDate.slice(5,7));

    document.getElementById('vcal-prev').addEventListener('click', ()=>{
      vcalMonth--; if(vcalMonth<1){vcalMonth=12;vcalYear--;} renderVoteCalendar();
    });
    document.getElementById('vcal-next').addEventListener('click', ()=>{
      vcalMonth++; if(vcalMonth>12){vcalMonth=1;vcalYear++;} renderVoteCalendar();
    });
    renderVoteCalendar();
  }

  function renderVoteCalendars() { initVoteCalendar(); }

  function renderVoteCalendar() {
    const grid = document.getElementById('vcal-grid');
    const label = document.getElementById('vcal-month-label');
    const prevBtn = document.getElementById('vcal-prev');
    const nextBtn = document.getElementById('vcal-next');
    if(!grid || !label) return;

    const proposedSet = new Set(poll.dates);

    // Determine min/max months from proposed dates
    const monthKeys = poll.dates.map(d=>d.slice(0,7));
    const minKey = monthKeys[0];
    const maxKey = monthKeys[monthKeys.length-1];
    const curKey = `${vcalYear}-${String(vcalMonth).padStart(2,'0')}`;

    // Disable nav if at boundaries
    prevBtn.disabled = curKey <= minKey;
    prevBtn.style.opacity = curKey <= minKey ? '0.3' : '1';
    nextBtn.disabled = curKey >= maxKey;
    nextBtn.style.opacity = curKey >= maxKey ? '0.3' : '1';

    label.textContent = cap(new Date(vcalYear, vcalMonth-1, 1).toLocaleDateString(t().locale,{month:'long',year:'numeric'}));

    const daysInMonth = new Date(vcalYear, vcalMonth, 0).getDate();
    let startDow = new Date(vcalYear, vcalMonth-1, 1).getDay();
    startDow = (startDow+6)%7;

    let cells = t().dayHeaders.map(h=>`<div class="vcal-header">${h}</div>`).join('');
    for(let i=0;i<startDow;i++) cells+='<div class="vcal-day empty"></div>';
    for(let day=1;day<=daysInMonth;day++){
      const key=`${vcalYear}-${String(vcalMonth).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const isP=proposedSet.has(key), isSel=selectedDates.has(key);
      cells+=`<div class="vcal-day ${isP?'proposed'+(isSel?' selected':''):'inactive'}" ${isP?`data-key="${key}"`:''}>${day}</div>`;
    }

    grid.innerHTML = cells;
    grid.querySelectorAll('.vcal-day.proposed').forEach(el=>{
      el.addEventListener('click',()=>{
        const k=el.dataset.key;
        if(selectedDates.has(k)) selectedDates.delete(k); else selectedDates.add(k);
        el.classList.toggle('selected',selectedDates.has(k));
      });
    });
  }

  /* --- Submit --- */
  async function submitVote() {
    const name=document.getElementById('voter-name').value.trim();
    const btn=document.getElementById('btn-submit');
    if(!name){showVoteMsg(t().errNoName,true);return;}
    btn.disabled=true; btn.textContent=t().btnSubmitting;
    try {
      const updatedVotes={...(poll.votes||{})};
      updatedVotes[name]=Array.from(selectedDates);
      await db.collection('polls').doc(pollId).update({votes:updatedVotes});
      poll.votes=updatedVotes;
      showVoteMsg(t().successVote(name));
      document.getElementById('voter-name').value='';
      selectedDates.clear();
      renderVoteCalendar();
      const v=Object.keys(poll.votes);
      const pill=document.getElementById('voters-pill');
      const cnt=document.getElementById('participants-count');
      if(pill) pill.textContent=`👤 ${t().participants(v.length)}`;
      if(cnt) cnt.textContent=`(${v.length})`;
    } catch(e){ console.error(e); showVoteMsg(t().errSubmit,true); }
    btn.disabled=false; btn.textContent=t().btnSubmit;
    setTimeout(()=>showVoteMsg(''),4000);
  }

  function showVoteMsg(txt,isError=false){
    const el=document.getElementById('vote-msg');
    if(!el) return;
    el.textContent=txt; el.className='vote-msg'+(isError?' error':'');
  }

  /* --- Tabs --- */
  function switchTab(tab){
    currentTab=tab;
    ['vote','participants','results'].forEach(t=>{
      document.getElementById(`tab-btn-${t}`)?.classList.toggle('active',t===tab);
      const pane=document.getElementById(`tab-${t}`);
      if(pane) pane.style.display=t===tab?'block':'none';
    });
    if(tab==='participants') renderParticipants();
    if(tab==='results') renderResults();
  }

  function renderParticipants(){
    const el=document.getElementById('tab-participants'); if(!el) return;
    const votes=poll.votes||{}, names=Object.keys(votes);
    if(names.length===0){el.innerHTML=`<div class="no-votes-msg">${t().noParticipants}</div>`;return;}
    el.innerHTML=names.map(name=>`
      <div class="participant-item">
        <div class="avatar">${getInitials(name)}</div>
        <div><div class="participant-name">${escHtml(name)}</div></div>
        <div class="participant-dates-summary">${t().datesAvail(votes[name].length)}</div>
      </div>`).join('');
  }

  function renderResults(){
    const el=document.getElementById('tab-results'); if(!el) return;
    const votes=poll.votes||{}, totalVoters=Object.keys(votes).length;
    if(totalVoters===0){el.innerHTML=`<div class="no-votes-msg">${t().noVotes}</div>`;return;}
    const scores=poll.dates.map(d=>({
      date:d, available:Object.entries(votes).filter(([,dts])=>dts.includes(d)).map(([n])=>n)
    })).sort((a,b)=>b.available.length-a.available.length);
    const max=scores[0].available.length||1;
    el.innerHTML=`<div class="results-header"><span style="font-size:0.85rem;color:var(--ink-muted);">${t().voted(totalVoters)}</span></div>`+
      scores.map((item,i)=>{
        const pct=Math.round(item.available.length/max*100), isTop=i===0;
        return `<div class="result-item ${isTop?'top':''}">
          <div class="result-top-row">
            <span class="rank-num ${isTop?'gold':''}">${i+1}.</span>
            <span class="result-date-label">${cap(formatDateShort(item.date))}</span>
            <span class="result-score">${item.available.length}/${totalVoters}</span>
          </div>
          <div class="result-bar-wrap"><div class="result-bar" style="width:${pct}%"></div></div>
          <div class="result-voters">
            ${item.available.map(n=>`<span class="voter-pill">${escHtml(n)}</span>`).join('')}
            ${item.available.length===0?`<span style="font-size:0.82rem;color:var(--ink-muted)">${t().nobody}</span>`:""}
          </div>
        </div>`;
      }).join('');
  }

  function copyLink(){
    navigator.clipboard.writeText(window.location.href).then(()=>{
      const btn=document.getElementById('copy-btn'); if(!btn) return;
      btn.textContent=t().btnCopied; btn.classList.add('copied');
      setTimeout(()=>{btn.textContent=t().btnCopy;btn.classList.remove('copied');},2500);
    });
  }

  function applyStaticTranslations() {
    const lang = getLang();
    document.documentElement.lang = lang;
    document.getElementById('lang-fr').classList.toggle('active', lang==='fr');
    document.getElementById('lang-en').classList.toggle('active', lang==='en');
    const btnNew = document.getElementById('btn-new-poll');
    if(btnNew) btnNew.textContent = t().btnNewPoll;
    const loadTxt = document.getElementById('loading-poll-text');
    if(loadTxt) loadTxt.textContent = t().loadingPoll;
    const errTitle = document.getElementById('err-title');
    if(errTitle) errTitle.textContent = t().errNotFound;
    const errSub = document.getElementById('err-sub');
    if(errSub) errSub.textContent = t().errNotFoundSub;
  }

  window.switchLang = function(lang) {
    setLang(lang);
    applyStaticTranslations();
    // Re-render poll content if loaded
    if(poll) { renderPoll(); renderVoteCalendar(); }
  };

  // Also update calendar day headers locale when rendering
  const _origRenderVoteCalendar = renderVoteCalendar;

  applyStaticTranslations();
  loadPoll();
</script>
</body>
</html>
